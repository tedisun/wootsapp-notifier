name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          PLUGIN_SLUG="wootsapp-notifier"
          VERSION="${GITHUB_REF_NAME}"

          # Copier dans un sous-dossier portant le slug du plugin.
          # WordPress exige que le ZIP contienne un dossier racine du même nom
          # que le slug pour que l'auto-update fonctionne correctement.
          mkdir -p dist/${PLUGIN_SLUG}

          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='node_modules' \
                    --exclude='vendor' \
                    --exclude='dist' \
                    --exclude='CONTEXT.md' \
                    --exclude='CLAUDE.md' \
                    --exclude='*.log' \
                    ./ dist/${PLUGIN_SLUG}/

          cd dist
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}/"
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WootsApp Notifier ${{ github.ref_name }}"
          body: |
            ## WootsApp Notifier ${{ github.ref_name }}

            Voir [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) pour le détail des changements.
          files: dist/wootsapp-notifier.zip
          fail_on_unmatched_files: true
